library:
  instrument: "PHQ-9"
  full_name: "Patient Health Questionnaire-9"
  version: "original"
  citation: "Kroenke K, Spitzer RL. The PHQ-9: A new depression diagnostic and severity measure. Psychiatric Annals. 2002;32(9):509-515."
  license: "No permission required to reproduce, translate, display or distribute."

  vocabularies:
    - vocabulary_id: LOINC
      vocabulary_name: "Logical Observation Identifiers Names and Codes"
      vocabulary_reference: "https://loinc.org"
    - vocabulary_id: SNOMED
      vocabulary_name: "SNOMED Clinical Terms"
      vocabulary_reference: "https://www.snomed.org"

  concepts:
    # Questions
    - { ref: "LOINC:44250-9",  name: "Little interest or pleasure in doing things",           domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:44255-8",  name: "Feeling down, depressed, or hopeless",                  domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:44259-0",  name: "Trouble falling or staying asleep, or sleeping too much", domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:44254-1",  name: "Feeling tired or having little energy",                 domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:44251-7",  name: "Poor appetite or overeating",                           domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:44258-2",  name: "Feeling bad about yourself",                            domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:44252-5",  name: "Trouble concentrating on things",                       domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:44253-3",  name: "Moving or speaking slowly or being fidgety/restless",   domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:44260-8",  name: "Thoughts of being better off dead or hurting yourself", domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:44261-6",  name: "PHQ-9 difficulty level",                                domain: Question, class: Survey, standard: S }
    # Frequency answers
    - { ref: "LOINC:LA6568-5", name: "Not at all",                domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6569-3", name: "Several days",              domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6570-1", name: "More than half the days",   domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6571-9", name: "Nearly every day",          domain: Answer, class: Answer, standard: S }
    # Difficulty answers
    - { ref: "LOINC:LA6572-7", name: "Not difficult at all",      domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6573-5", name: "Somewhat difficult",        domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6574-3", name: "Very difficult",            domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6575-0", name: "Extremely difficult",       domain: Answer, class: Answer, standard: S }

  option_sets:
    phq_frequency:
      - { text: "Not at all",               value: "0", concept: "LOINC:LA6568-5" }
      - { text: "Several days",             value: "1", concept: "LOINC:LA6569-3" }
      - { text: "More than half the days",  value: "2", concept: "LOINC:LA6570-1" }
      - { text: "Nearly every day",         value: "3", concept: "LOINC:LA6571-9" }

  questions:
    - link_id: phq9.1
      text: "Little interest or pleasure in doing things"
      type: single_choice
      concept: "LOINC:44250-9"
      source_item_id: "PHQ-9-1"
      options: $phq_frequency

    - link_id: phq9.2
      text: "Feeling down, depressed, or hopeless"
      type: single_choice
      concept: "LOINC:44255-8"
      source_item_id: "PHQ-9-2"
      options: $phq_frequency

    - link_id: phq9.3
      text: "Trouble falling or staying asleep, or sleeping too much"
      type: single_choice
      concept: "LOINC:44259-0"
      source_item_id: "PHQ-9-3"
      options: $phq_frequency

    - link_id: phq9.4
      text: "Feeling tired or having little energy"
      type: single_choice
      concept: "LOINC:44254-1"
      source_item_id: "PHQ-9-4"
      options: $phq_frequency

    - link_id: phq9.5
      text: "Poor appetite or overeating"
      type: single_choice
      concept: "LOINC:44251-7"
      source_item_id: "PHQ-9-5"
      options: $phq_frequency

    - link_id: phq9.6
      text: "Feeling bad about yourself — or that you are a failure or have let yourself or your family down"
      type: single_choice
      concept: "LOINC:44258-2"
      source_item_id: "PHQ-9-6"
      options: $phq_frequency

    - link_id: phq9.7
      text: "Trouble concentrating on things, such as reading the newspaper or watching television"
      type: single_choice
      concept: "LOINC:44252-5"
      source_item_id: "PHQ-9-7"
      options: $phq_frequency

    - link_id: phq9.8
      text: "Moving or speaking so slowly that other people could have noticed — or being so fidgety or restless that you have been moving around a lot more than usual"
      type: single_choice
      concept: "LOINC:44253-3"
      source_item_id: "PHQ-9-8"
      options: $phq_frequency

    - link_id: phq9.9
      text: "Thoughts that you would be better off dead, or of hurting yourself in some way"
      type: single_choice
      concept: "LOINC:44260-8"
      source_item_id: "PHQ-9-9"
      options: $phq_frequency

    - link_id: phq9.difficulty
      text: "If you checked off any problems, how difficult have these problems made it for you to do your work, take care of things at home, or get along with other people?"
      type: single_choice
      concept: "LOINC:44261-6"
      source_item_id: "PHQ-9-10"
      options:
        - { text: "Not difficult at all", value: "0", concept: "LOINC:LA6572-7" }
        - { text: "Somewhat difficult",   value: "1", concept: "LOINC:LA6573-5" }
        - { text: "Very difficult",       value: "2", concept: "LOINC:LA6574-3" }
        - { text: "Extremely difficult",  value: "3", concept: "LOINC:LA6575-0" }

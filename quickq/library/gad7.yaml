library:
  instrument: "GAD-7"
  full_name: "Generalized Anxiety Disorder 7-item scale"
  version: "original"
  citation: "Spitzer RL, Kroenke K, Williams JBW, Löwe B. A brief measure for assessing generalized anxiety disorder. Arch Intern Med. 2006;166(10):1092-1097."
  license: "No permission required to reproduce, translate, display or distribute."

  vocabularies:
    - vocabulary_id: LOINC
      vocabulary_name: "Logical Observation Identifiers Names and Codes"
      vocabulary_reference: "https://loinc.org"

  concepts:
    # Questions
    - { ref: "LOINC:69725-0", name: "Feeling nervous, anxious, or on edge",                      domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:68509-9", name: "Not being able to stop or control worrying",                 domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:69733-4", name: "Worrying too much about different things",                   domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:69734-2", name: "Trouble relaxing",                                           domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:69735-9", name: "Being so restless that it is hard to sit still",             domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:69736-7", name: "Becoming easily annoyed or irritable",                       domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:69737-5", name: "Feeling afraid as if something awful might happen",          domain: Question, class: Survey, standard: S }
    - { ref: "LOINC:69738-3", name: "GAD-7 difficulty level",                                     domain: Question, class: Survey, standard: S }
    # Frequency answers (same codes as PHQ-9)
    - { ref: "LOINC:LA6568-5", name: "Not at all",               domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6569-3", name: "Several days",             domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6570-1", name: "More than half the days",  domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6571-9", name: "Nearly every day",         domain: Answer, class: Answer, standard: S }
    # Difficulty answers (reused from PHQ-9)
    - { ref: "LOINC:LA6572-7", name: "Not difficult at all",     domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6573-5", name: "Somewhat difficult",       domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6574-3", name: "Very difficult",           domain: Answer, class: Answer, standard: S }
    - { ref: "LOINC:LA6575-0", name: "Extremely difficult",      domain: Answer, class: Answer, standard: S }

  option_sets:
    gad_frequency:
      - { text: "Not at all",              value: "0", concept: "LOINC:LA6568-5" }
      - { text: "Several days",            value: "1", concept: "LOINC:LA6569-3" }
      - { text: "More than half the days", value: "2", concept: "LOINC:LA6570-1" }
      - { text: "Nearly every day",        value: "3", concept: "LOINC:LA6571-9" }

  questions:
    - link_id: gad7.1
      text: "Feeling nervous, anxious, or on edge"
      type: single_choice
      concept: "LOINC:69725-0"
      source_item_id: "GAD-7-1"
      options: $gad_frequency

    - link_id: gad7.2
      text: "Not being able to stop or control worrying"
      type: single_choice
      concept: "LOINC:68509-9"
      source_item_id: "GAD-7-2"
      options: $gad_frequency

    - link_id: gad7.3
      text: "Worrying too much about different things"
      type: single_choice
      concept: "LOINC:69733-4"
      source_item_id: "GAD-7-3"
      options: $gad_frequency

    - link_id: gad7.4
      text: "Trouble relaxing"
      type: single_choice
      concept: "LOINC:69734-2"
      source_item_id: "GAD-7-4"
      options: $gad_frequency

    - link_id: gad7.5
      text: "Being so restless that it is hard to sit still"
      type: single_choice
      concept: "LOINC:69735-9"
      source_item_id: "GAD-7-5"
      options: $gad_frequency

    - link_id: gad7.6
      text: "Becoming easily annoyed or irritable"
      type: single_choice
      concept: "LOINC:69736-7"
      source_item_id: "GAD-7-6"
      options: $gad_frequency

    - link_id: gad7.7
      text: "Feeling afraid as if something awful might happen"
      type: single_choice
      concept: "LOINC:69737-5"
      source_item_id: "GAD-7-7"
      options: $gad_frequency

    - link_id: gad7.difficulty
      text: "If you checked off any problems, how difficult have these problems made it for you to do your work, take care of things at home, or get along with other people?"
      type: single_choice
      concept: "LOINC:69738-3"
      source_item_id: "GAD-7-8"
      options:
        - { text: "Not difficult at all", value: "0", concept: "LOINC:LA6572-7" }
        - { text: "Somewhat difficult",   value: "1", concept: "LOINC:LA6573-5" }
        - { text: "Very difficult",       value: "2", concept: "LOINC:LA6574-3" }
        - { text: "Extremely difficult",  value: "3", concept: "LOINC:LA6575-0" }

site_name: quickq
site_description: Health and Epidemiology Survey Authoring & Analytics
site_author: quickq Contributors
repo_url: https://github.com/ssis2dbt/quickq

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Welcome: index.md
  - Why quickq?: why_quickq.md
  - Tutorials:
      - End-to-End Study: tutorial.md
      - Authoring an Instrument: tutorials/authoring.md
  - Design Philosophy: philosophy.md
  - Architecture: architecture.md
  - Survey Authoring: authoring.md
  - FHIR Interoperability: fhir.md
  - Analytics & Data Model: analytics.md
  - Reference:
      - Query Patterns by Question Type: reference/query-patterns.md
      - Instrument Versioning & Data Governance: reference/versioning.md
  - Database Schema:
      - OLTP (SQLite): database/oltp.md
      - OLAP (DuckDB): database/olap.md

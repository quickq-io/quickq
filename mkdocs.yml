site_name: quickq
site_description: Health and Epidemiology Survey Authoring & Analytics
site_author: quickq Contributors
repo_url: https://github.com/ssis2dbt/quickq

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Welcome: index.md
  - Why quickq?: why_quickq.md
  - The Study Journey: tutorial.md
  - Tutorials:
      - 1. Author an Instrument: tutorials/authoring.md
      - 2. Collect Responses: tutorials/collect.md
      - 3. Analyze: tutorials/analytics.md
      - 4. Data Quality: tutorials/data-quality.md
      - 5. Share & Publish: tutorials/share.md
      - 6. Multi-Site Study Operations: tutorials/multi-site.md
  - Reference:
      - Query Patterns by Question Type: reference/query-patterns.md
      - Instrument Versioning & Data Governance: reference/versioning.md
      - FHIR Interoperability: fhir.md
      - OMOP Interoperability: reference/omop.md
      - Survey Authoring (YAML): authoring.md
      - 'Example: PHQ-9 Rendered Instrument': reference/example-phq9.md
  - Going Deeper:
      - Architecture: architecture.md
      - Design Philosophy: philosophy.md
      - Analytics & Data Model: analytics.md
  - Database Schema:
      - OLTP (SQLite): database/oltp.md
      - OLAP (DuckDB): database/olap.md

site_name: quickq
site_description: Health and Epidemiology Survey Authoring & Analytics
site_author: quickq Contributors
site_url: https://quickq-io.github.io/quickq/
repo_url: https://github.com/quickq-io/quickq

hooks:
  - hooks/marimo_export.py

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Welcome: index.md
  - Architecture: architecture.md
  - Design Decisions: design_decisions.md
  - The Study Journey: tutorial.md
  - Tutorials:
      - 'Quickstart: End-to-End Walkthrough': tutorials/end-to-end.md
      - Authoring an Instrument: tutorials/authoring.md
      - 'Demo phase: Collect Responses': tutorials/collect.md
      - 'Demo phase: Analyze': tutorials/analytics.md
      - 'Demo phase: Data Quality': tutorials/data-quality.md
      - 'Demo phase: Share & Publish': tutorials/share.md
      - Multi-Site Study Operations: tutorials/multi-site.md
  - Reference:
      - Question Types: reference/question-types.md
      - Query Patterns by Question Type: reference/query-patterns.md
      - Analysis Recipes (Python + Charts): reference/analysis-recipes.md
      - Synthetic Data (seed): reference/seed.md
      - Instrument Versioning & Data Governance: reference/versioning.md
      - Compliance & Governance: reference/compliance.md
      - Federated Analytics: reference/federated.md
      - FHIR Interoperability: fhir.md
      - OMOP Interoperability: reference/omop.md
      - Survey Authoring (YAML): authoring.md
      - 'Example: PHQ-9 Rendered Instrument': reference/example-phq9.md
      - 'Example: PRAPARE Data Dictionary': reference/example-prapare-data-dict.md
      - 'Example: Gout Check-In (all question types)': reference/example-gout-checkin.md
  - Going Deeper:
      - Design Philosophy: philosophy.md
      - Analytics & Data Model: analytics.md
  - Database Schema:
      - OLTP (SQLite): database/oltp.md
      - OLAP (DuckDB): database/olap.md

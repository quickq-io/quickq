site_name: quickq
site_description: Health and Epidemiology Survey Authoring & Analytics
site_author: quickq Contributors
site_url: https://quickq-io.github.io/quickq/
repo_url: https://github.com/quickq-io/quickq

exclude_docs: |
  _drafts/

hooks:
  - hooks/marimo_export.py

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Welcome: index.md
  - Tutorials:
      - 'Start here: End-to-End Walkthrough': tutorials/end-to-end.md
      - 'The Study Journey (overview)': tutorial.md
      - 'Authoring deep-dive': tutorials/authoring.md
      - '1. Collect responses': tutorials/collect.md
      - '2. Analyze': tutorials/analytics.md
      - '3. Data quality': tutorials/data-quality.md
  - Reference:
      - Question Types: reference/question-types.md
      - Survey Authoring (YAML): authoring.md
      - Query Patterns by Question Type: reference/query-patterns.md
      - Skip-Logic Recipes: reference/skip-logic-qc.md
      - Analysis Recipes (Python): reference/analysis-recipes.md
      - Analysis Recipes (R): reference/analysis-recipes-r.md
      - Synthetic Data (seed): reference/seed.md
      - Instrument Versioning & Data Governance: reference/versioning.md
      - Compliance & Governance: reference/compliance.md
      - Federated Analytics: reference/federated.md
      - FHIR Interoperability: fhir.md
      - Third-party FHIR Renderers: reference/third-party-renderers.md
      - OMOP Interoperability: reference/omop.md
      - Worked examples:
          - 'PHQ-9 Rendered Instrument': reference/example-phq9.md
          - 'PRAPARE Data Dictionary': reference/example-prapare-data-dict.md
          - 'Gout Check-In (all question types)': reference/example-gout-checkin.md
  - Going deeper:
      - Architecture: architecture.md
      - Design Decisions: design_decisions.md
      - Design Philosophy: philosophy.md
      - Analytics & Data Model: analytics.md
      - 'Data Model (overview)': database/data-model.md
      - 'Database Schema (SQLite OLTP)': database/oltp.md
      - 'Database Schema (DuckDB OLAP)': database/olap.md
